name: Keep Streamlit Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: First ping
        run: curl -sS -L "https://appsimplepy-aq5imo7g2rgzjoadzekymy.streamlit.app" -o /dev/null

      - name: Wait before second ping
        run: sleep 15

      - name: Second ping
        run: curl -sS -L "https://appsimplepy-aq5imo7g2rgzjoadzekymy.streamlit.app" -o /dev/null
